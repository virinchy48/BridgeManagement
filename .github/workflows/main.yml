name: CI/CD

on:
  push:
    branches: [ main, draftv* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: CDS compile check
        run: npx cds compile db/ srv/ 2>&1 | grep -E "^\[ERROR\]" && exit 1 || exit 0

      - name: Run tests
        run: npm test

      - name: CDS production build
        run: npx cds build --production

      - name: Install MBT
        run: npm install -g mbt

      - name: Build MTAR
        run: mbt build --mtar BridgeManagement_ci.mtar

      - name: Upload MTAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtar-${{ github.sha }}
          path: mta_archives/BridgeManagement_ci.mtar
          retention-days: 7
