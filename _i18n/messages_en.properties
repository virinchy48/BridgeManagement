MANDATORY_FIELD_MISSING = {label} is required. Enter a value before saving.
INVALID_INTEGER = {label} must be a whole number. Decimals are not allowed.
INVALID_INTEGER_WITH_RANGE = {label} must be a whole number from {min} to {max}. Decimals are not allowed.
INVALID_NUMBER = {label} must be a valid number. Use digits only, with a decimal point if needed.
INVALID_NUMBER_WITH_RANGE = {label} must be a number from {min} to {max}. {hint}
VALUE_OUT_OF_RANGE = {label} must be from {min} to {max}. {hint}
