appTitle = Bridge Asset Registry
appSubTitle = CAP Sample Application
appDescription = Create and edit bridges

# Fiori Elements fallback title: shown when bridge name is not yet entered
T_NEW_OBJECT=New Bridge

# Validation: required fields
error.bridgeName.required=Bridge Name is required
error.state.required=State is required
error.assetOwner.required=Asset Owner is required
error.structureType.required=Structure Type is required
error.postingStatus.required=Posting Status is required
error.conditionRating.required=Condition Rating is required
error.lastInspectionDate.required=Last Inspection Date is required
error.latitude.required=Latitude is required
error.longitude.required=Longitude is required

# Validation: numeric ranges
error.latitude.range=Latitude must be between -90 and 90
error.longitude.range=Longitude must be between -180 and 180
error.yearBuilt.range=Year Built must be between 1800 and 2100
error.conditionRating.range=Condition Rating must be between 1 and 10
error.structuralAdequacyRating.range=Structural Adequacy Rating must be between 1 and 10
error.importanceLevel.range=Importance Level must be between 1 (Critical) and 4 (Ordinary)
error.heavyVehiclePercent.range=Heavy Vehicle Percentage must be between 0 and 100
error.spanCount.range=Number of Spans must be between 1 and 500
error.numberOfLanes.range=Number of Lanes must be between 1 and 20
error.spanLength.range=Span Length must be between 0.1 and 5,000 m
error.totalLength.range=Total Length must be between 0.1 and 50,000 m
error.deckWidth.range=Deck Width must be between 0.5 and 200 m
error.clearanceHeight.range=Clearance Height must be between 0 and 100 m
error.loadRating.range=Load Rating must be between 0 and 10,000 t
error.averageDailyTraffic.range=Average Daily Traffic must be between 0 and 9,999,999
error.floodImmunityAriYears.range=Flood Immunity ARI must be between 1 and 10,000 years
error.scourDepthLastMeasured.range=Scour Depth must be between 0 and 500 m

# Validation: restriction physical limits (inline on Bridge)
error.speedLimit.range=Speed Limit must be between 0 and 130 km/h
error.grossMassLimit.range=Gross Mass Limit must be between 0 and 1,000 t
error.axleMassLimit.range=Axle Mass Limit must be between 0 and 500 t
error.heightLimit.range=Height Limit must be between 0 and 30 m
error.widthLimit.range=Width Limit must be between 0 and 100 m
error.lengthLimit.range=Length Limit must be between 0 and 1,000 m

# Validation: capacity
error.capacityType.required=Capacity Type is required
error.ratingFactor.range=Rating Factor must be between 0 and 10
error.consumedLife.range=Consumed Life must be between 0 and 200%

# Validation: scour assessment
error.assessmentDate.required=Assessment Date is required
error.assessmentType.required=Assessment Type is required
error.scourRisk.required=Scour Risk Level is required
error.assessor.required=Assessor is required
error.measuredDepth.range=Measured Scour Depth must be between 0 and 500 m

