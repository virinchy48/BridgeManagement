admin.featureFlags.scopeStatus=Can Manage
admin.featureFlags.dependency.note=Disabling BHI/BSI Assessment (master flag) will automatically disable all dependent flags: Org Comparison, Scour PoA, Certification Workflow, and Admin Weight Config.
admin.featureFlags.devGuide.title=How to Request a New Feature Flag
admin.featureFlags.devGuide.body=<p>Feature flags are managed by your IT administrator or solution partner. To request a new flag:</p><ol><li><strong>Identify the feature</strong> — Give it a clear business name (e.g. "Predictive Maintenance Module") and describe which screens or functions it should show or hide.</li><li><strong>Define the default</strong> — Should the feature start ON or OFF when first deployed? Most new features start OFF and are enabled after testing.</li><li><strong>Define who can enable it</strong> — Only users with the Config Manager or Admin role can toggle flags on this screen. Confirm with your administrator who should have that access.</li><li><strong>Submit a change request</strong> — Your IT administrator will register the flag in the system configuration and deploy an updated version of the application. This typically requires a short maintenance window.</li><li><strong>Test before enabling in production</strong> — Enable the flag in your staging environment first and validate the feature works as expected before turning it on for all users.</li></ol><p>Current flags above are managed directly on this screen by toggling the switch. Changes take effect immediately for all users without a restart.</p>
