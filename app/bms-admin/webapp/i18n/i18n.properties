# Feature Flags (Admin)
admin.featureFlags.title=Feature Flags
admin.featureFlags.info=Feature flags control which BHI/BSI assessment capabilities are visible across the system. Changes take effect immediately — no deployment required. All flags default to OFF and must be explicitly enabled here.
admin.featureFlags.table.title=Feature Flag Status
admin.featureFlags.col.feature=Feature
