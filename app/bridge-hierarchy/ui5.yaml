specVersion: "3.0"
metadata:
  name: bridge-management-bridgehierarchy
type: application
framework:
  name: SAPUI5
  version: "1.136.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: themelib_sap_horizon
builder:
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateVersionInfo
      configuration:
        archiveName: bridge-hierarchy
        relativePaths: true
        additionalFiles:
          - xs-app.json
