specVersion: '4.0'
metadata:
  name: BridgeManagement.bridgespublic
type: application
resources:
  configuration:
    paths:
      webapp: webapp
builder:
  resources:
    excludes:
      - /test/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateVersionInfo
      configuration:
        archiveName: bridges-public
        relativePaths: true
        additionalFiles:
          - xs-app.json
