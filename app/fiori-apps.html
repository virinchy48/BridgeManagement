<!doctype html>
<html>

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Bridge Management System (BMS)</title>

  <script>
    window['sap-ushell-config'] = {
      defaultRenderer: 'fiori2',
      renderers: {
        fiori2: {
          componentData: {
            config: {
              enableSearch: false // suppress browser errors
            }
          }
        }
      },
      applications: {
        "BridgeManagement.adminbridges~Bridges-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.adminbridges",
          applicationType: "URL",
          url: "../admin-bridges/webapp",
          description: "Bridge Asset Registry",
          title: "Bridges"
        },
        "BridgeManagement.restrictions~Restrictions-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.restrictions",
          applicationType: "URL",
          url: "../restrictions/webapp",
          description: "Active & Scheduled Restrictions",
          title: "Restrictions"
        },
        "BridgeManagement.dashboard~Dashboard-display": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.dashboard",
          applicationType: "URL",
          url: "../dashboard/webapp",
          description: "BMS Dashboard",
          title: "Dashboard"
        },
        "BridgeManagement.massedit~MassEdit-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.massedit",
          applicationType: "URL",
          url: "../mass-edit/webapp",
          description: "In-App Grid Editor",
          title: "Mass Edit"
        },
        "BridgeManagement.massupload~MassUpload-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.massupload",
          applicationType: "URL",
          url: "../mass-upload/webapp",
          description: "Bulk Data Import",
          title: "Mass Upload"
        },
        "BridgeManagement.mapview~Map-display": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.mapview",
          applicationType: "URL",
          url: "../map-view/webapp",
          description: "Bridge Map — Australia",
          title: "Map"
        },
        "BridgeManagement.bmsadmin~BmsAdmin-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.bmsadmin",
          applicationType: "URL",
          url: "../bms-admin/webapp",
          description: "Change Documents · Data Quality · Reference Data · User Access · System Config · BNAC Config",
          title: "BMS Administration"
        }
      }
    }
  </script>

  <script
    id="sap-ushell-bootstrap"
    src="https://ui5.sap.com/test-resources/sap/ushell/bootstrap/sandbox.js">
  </script>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ushell,sap.collaboration,sap.ui.layout"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-theme="sap_horizon">
  </script>

  <script>
    sap.ui.getCore().attachInit(() => {
      sap.ushell.Container
        .createRenderer('fiori2', true)
        .then(renderer => renderer.placeAt('content'))
    })
  </script>
</head>

<body class="sapUiBody" id="content"></body>

</html>
