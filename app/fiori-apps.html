  <title>New Bridge Management System (BMS)</title>

        ClientSideTargetResolution: {

            config: {

  <script>
    (function() {
      var cfg = window['sap-ushell-config'];
      var launchCfg = cfg.services.LaunchPage.adapter.config;

      var myGroups = launchCfg.groups;
      Object.defineProperty(launchCfg, 'groups', {
        get: function() { return myGroups; },
        set: function() {},
        configurable: false
      });

      var myCatalogs = [];
      Object.defineProperty(launchCfg, 'catalogs', {
        get: function() { return myCatalogs; },
        set: function() {},
        configurable: false
      });

      Object.defineProperty(cfg, 'catalogueEntries', {
        get: function() { return []; },
        set: function() {},
        configurable: false
      });
    })();
  </script>

  <script
    id="sap-ushell-bootstrap"
    src="https://sapui5.hana.ondemand.com/1.145.0/test-resources/sap/ushell/bootstrap/sandbox.js">
  </script>

  <script
    id="sap-ui-bootstrap"
    src="https://sapui5.hana.ondemand.com/1.145.0/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.ui.core,sap.ui.generic.app,sap.ushell,sap.fe.templates"
    data-sap-ui-flexibilityServices='[{"connector": "LocalStorageConnector"}]'
    data-sap-ui-compatVersion="edge"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-preload="async">
  </script>

  <script>
    sap.ui.getCore().attachInit(() => {
      sap.ushell.Container
        .createRenderer('fiori2', true)
        .then(renderer => renderer.placeAt('content'))
    })
  </script>
</head>

<body class="sapUiBody" id="content"></body>

</html>
