<!doctype html>
<html>

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Bridge Management System (BMS)</title>

  <script>
    window['sap-ushell-config'] = {
      defaultRenderer: 'fiori2',
      renderers: {
        fiori2: {
          componentData: {
            config: {
              enableSearch: false // suppress browser errors
            }
          }
        }
      },
      applications: {
        "BridgeManagement.auditreport~AuditReport-display": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.auditreport",
          applicationType: "URL",
          url: "../audit-report/webapp",
          description: "Change Document Report",
          title: "Change Document Report"
        },
        "BridgeManagement.dataquality~DataQuality-display": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.dataquality",
          applicationType: "URL",
          url: "../data-quality/webapp",
          description: "Bridge data completeness and issue tracking",
          title: "Data Quality Dashboard"
        },
        "BridgeManagement.referencedata~ReferenceData-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.referencedata",
          applicationType: "URL",
          url: "../reference-data/webapp",
          description: "Manage BMS code lists and dropdown values",
          title: "Reference Data Administration"
        },
        "BridgeManagement.useraccess~UserAccess-display": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.useraccess",
          applicationType: "URL",
          url: "../user-access/webapp",
          description: "Track who has accessed BMS",
          title: "User Access & Activity"
        },
        "BridgeManagement.systemconfig~SystemConfig-manage": {
          additionalInformation: "SAPUI5.Component=BridgeManagement.systemconfig",
          applicationType: "URL",
          url: "../system-config/webapp",
          description: "Runtime configuration settings for BMS",
          title: "System Configuration"
        }
      }
    }
  </script>

  <script
    id="sap-ushell-bootstrap"
    src="https://ui5.sap.com/test-resources/sap/ushell/bootstrap/sandbox.js">
  </script>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ushell,sap.collaboration,sap.ui.layout"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-theme="sap_horizon">
  </script>

  <script>
    sap.ui.getCore().attachInit(() => {
      sap.ushell.Container
        .createRenderer('fiori2', true)
        .then(renderer => renderer.placeAt('content'))
    })
  </script>
</head>

<body class="sapUiBody" id="content"></body>

</html>
