appTitle = Restrictions Registry
appSubTitle = Network-level & policy restrictions
appDescription = Manage network-wide and policy-level restrictions. Bridge-specific restrictions (load limits, height, width) are managed from the individual Bridge record.

# Validation — required fields
error.bridge.required=Bridge is required — enter or select a Bridge ID
error.restrictionCategory.required=Category is required
error.restrictionType.required=Restriction Type is required
error.restrictionValue.required=Value is required
error.restrictionUnit.required=Unit is required
error.effectiveFrom.required=Effective From date is required
error.temporaryFrom.required=Temporary From date is required when category is Temporary
error.temporaryTo.required=Temporary To date is required when category is Temporary

# Validation — date logic
error.effectiveTo.beforeFrom=Effective To must be on or after Effective From
error.temporaryTo.beforeFrom=Temporary To must be on or after Temporary From

# Validation — physical limit ranges
error.speedLimit.range=Speed Limit must be between 0 and 130 km/h
error.grossMassLimit.range=Gross Mass Limit must be between 0 and 1,000 t
error.axleMassLimit.range=Axle Mass Limit must be between 0 and 500 t
error.heightLimit.range=Height Limit must be between 0 and 30 m
error.widthLimit.range=Width Limit must be between 0 and 100 m
error.lengthLimit.range=Length Limit must be between 0 and 1,000 m

# Warnings
warning.gazetteExpiringSoon=Gazette authority expires in {0} days. Renewal required.
warning.gazetteExpired=Gazette authority has EXPIRED. This restriction may not have legal authority.
warning.effectiveToInPast=Effective To date is in the past — this restriction may already be expired.
