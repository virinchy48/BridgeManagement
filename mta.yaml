_schema-version: 3.3.0
ID: BridgeManagement
version: 1.7.2
description: "Bridge Management System — NSW standalone"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: BridgeManagement-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      health-check-type: none
    properties:
      DEFAULT_STATE: NSW
      MULTI_STATE_ENABLED: "false"
      APP_VERSION: "1.0.0-nsw-standalone"
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: BridgeManagement-auth
      - name: BridgeManagement-db
      - name: BridgeManagement-destination
      - name: BridgeManagement-logging

  - name: BridgeManagement-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      ignore:
        - node_modules/
        - .env
    requires:
      - name: BridgeManagement-db

  - name: BridgeManagement
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: BridgeManagement-auth
      - name: BridgeManagement-destination
      - name: BridgeManagement-html5-runtime
      - name: BridgeManagement-logging
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: BridgeManagement-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: BridgeManagementadminbridges
          artifacts:
            - admin-bridges.zip
          target-path: app/
        - name: BridgeManagementmapview
          artifacts:
            - map-view.zip
          target-path: app/
        - name: BridgeManagementmassedit
          artifacts:
            - mass-edit.zip
          target-path: app/
        - name: BridgeManagementrestrictions
          artifacts:
            - restrictions.zip
          target-path: app/
        - name: BridgeManagementattributesadmin
          artifacts:
            - attributes-admin.zip
          target-path: app/
        - name: BridgeManagementbmsadmin
          artifacts:
            - bms-admin.zip
          target-path: app/
        - name: BridgeManagementdashboard
          artifacts:
            - dashboard.zip
          target-path: app/
        - name: BridgeManagementmassupload
          artifacts:
            - mass-upload.zip
          target-path: app/
        - name: BridgeManagementoperationsbridges
          artifacts:
            - operations-bridges.zip
          target-path: app/
        - name: BridgeManagementoperationsrestrictions
          artifacts:
            - operations-restrictions.zip
          target-path: app/
    requires:
      - name: BridgeManagement-auth
      - name: srv-api
      - name: BridgeManagement-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: BridgeManagementadminbridges
    type: html5
    path: app/admin-bridges
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementmapview
    type: html5
    path: app/map-view
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementmassedit
    type: html5
    path: app/mass-edit
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementrestrictions
    type: html5
    path: app/restrictions
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementbmsadmin
    type: html5
    path: app/bms-admin
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementattributesadmin
    type: html5
    path: app/attributes-admin
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementdashboard
    type: html5
    path: app/dashboard
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementmassupload
    type: html5
    path: app/mass-upload
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementoperationsbridges
    type: html5
    path: app/operations/bridges
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: BridgeManagementoperationsrestrictions
    type: html5
    path: app/operations/restrictions
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

resources:
  - name: BridgeManagement-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: BridgeManagement-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: "BMS Admin (${org}-${space})"
            description: "Full BMS administration"
            role-template-references:
              - "$XSAPPNAME.admin"
          - name: "BMS Bridge Manager (${org}-${space})"
            description: "Bridge register management"
            role-template-references:
              - "$XSAPPNAME.BMS_BRIDGE_MANAGER"
          - name: "BMS Operator (${org}-${space})"
            description: "Bridge operations"
            role-template-references:
              - "$XSAPPNAME.BMS_OPERATOR"
          - name: "BMS Viewer (${org}-${space})"
            description: "Read-only access"
            role-template-references:
              - "$XSAPPNAME.BMS_VIEWER"
    requires:
      - name: app-api

  - name: BridgeManagement-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: BridgeManagement-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: BridgeManagement-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: BridgeManagement-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: BridgeManagement-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite
