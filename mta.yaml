_schema-version: 3.3.0
ID: BridgeManagement
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: BridgeManagement-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: BridgeManagement-auth
      - name: BridgeManagement-db
      - name: BridgeManagement-destination
      - name: BridgeManagement-logging
      - name: BridgeManagement-auditlog

  - name: BridgeManagement-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: BridgeManagement-db
  - name: BridgeManagement
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: BridgeManagement-auth
      - name: BridgeManagement-destination
      - name: BridgeManagement-html5-runtime
      - name: BridgeManagement-logging
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: BridgeManagement-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: BridgeManagementadminbridges
          artifacts:
            - admin-bridges.zip
          target-path: app/
        - name: BridgeManagementmapview
          artifacts:
            - map-view.zip
          target-path: app/
        - name: BridgeManagementmassedit
          artifacts:
            - mass-edit.zip
          target-path: app/
        - name: BridgeManagementrestrictions
          artifacts:
            - restrictions.zip
          target-path: app/
        - name: BridgeManagementattributesadmin
          artifacts:
            - attributes-admin.zip
          target-path: app/
        - name: BridgeManagementbmsadmin
          artifacts:
            - bms-admin.zip
          target-path: app/
    requires:
      - name: BridgeManagement-auth
      - name: srv-api
      - name: BridgeManagement-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: BridgeManagementadminbridges
    type: html5
    path: app/admin-bridges
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: BridgeManagementmapview
    type: html5
    path: app/map-view
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: BridgeManagementmassedit
    type: html5
    path: app/mass-edit
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: BridgeManagementrestrictions
    type: html5
    path: app/restrictions
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: BridgeManagementbmsadmin
    type: html5
    path: app/bms-admin
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: BridgeManagementattributesadmin
    type: html5
    path: app/attributes-admin
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

resources:
  - name: BridgeManagement-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: BridgeManagement-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'admin (BridgeManagement ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
    requires:
      - name: app-api
  - name: BridgeManagement-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: BridgeManagement-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: BridgeManagement-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: BridgeManagement-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: BridgeManagement-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: standard
  - name: BridgeManagement-auditlog
    type: org.cloudfoundry.managed-service
    parameters:
      service: auditlog
      service-plan: premium
